apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceevee-app
  namespace: ceevee
  labels:
    app: ceevee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ceevee
  template:
    metadata:
      labels:
        app: ceevee
    spec:
      containers:
        - name: ceevee
          # TODO: Replace <your-github-username> with your actual username
          image: ghcr.io/<your-github-username>/ceevee:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
